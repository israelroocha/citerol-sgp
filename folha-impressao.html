<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Folha de Separação</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Oswald:wght@500;700;800&display=swap" rel="stylesheet"/>
<style>
  :root{
    /* Cores mais escuras pra impressão B&W ficar legível */
    --red:#7a0007; --black:#000; --g700:#222; --g600:#333; --g500:#555; --g400:#777;
    --g200:#c0c0c0; --g100:#e0e0e0; --g50:#f0f0f0;
    --green:#0d4d24; --green-bg:#e8f5ec; --green-bd:#4a8f5f;
    --orange:#7a2a06; --orange-bg:#fce8d5; --orange-bd:#c46a2f;
    --redx:#5c0f0f; --redx-bg:#f5d5d5; --redx-bd:#9e3d3d;
    --amber:#5a2a06; --amber-bg:#faedcf; --amber-bd:#a67a1a;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#ececed; font-family:'Montserrat',sans-serif; color:var(--black); }
  .wrap{ display:flex; flex-direction:column; align-items:center; gap:18px; padding:18px; }
  .folha{ background:#fff; width:100%; max-width:820px; padding:32px; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.08); }
  .head{ display:flex; align-items:center; gap:16px; border-bottom:2px solid var(--g500); padding-bottom:14px; margin-bottom:14px; page-break-inside:avoid; }
  .head img{ height:44px; object-fit:contain; }
  .brand{ font-family:'Oswald',sans-serif; font-size:20px; font-weight:800; color:var(--red); white-space:nowrap; }
  .emit-nome{ font-family:'Oswald',sans-serif; font-size:15px; font-weight:800; color:var(--black); }
  .emit-sub{ font-size:11px; color:var(--g600); font-weight:600; }
  .head .right{ text-align:right; flex-shrink:0; margin-left:auto; }
  .tag{ font-family:'Oswald',sans-serif; font-size:10px; font-weight:700; color:var(--g600); letter-spacing:.1em; }
  .pedido{ font-family:'Oswald',sans-serif; font-size:18px; font-weight:800; color:var(--black); }
  .data{ font-size:11px; color:var(--g600); font-weight:600; }

  /* Banner de status — bem destacado, com símbolo pra distinguir sem cor */
  .status-banner{
    margin-bottom:16px; border-radius:10px; padding:12px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    border:2px solid; font-family:'Oswald',sans-serif; page-break-inside:avoid;
  }
  .status-banner .lbl{ font-size:18px; font-weight:800; letter-spacing:.04em; }
  .status-banner .sub{ font-size:11px; font-weight:700; margin-top:3px; letter-spacing:.05em; }
  .status-banner .info-right{ text-align:right; font-size:12px; font-weight:800; font-family:'Montserrat',sans-serif; }
  .status-banner .icon{ font-size:22px; margin-right:10px; }
  .st-completa{ background:var(--green-bg); border-color:var(--green-bd); color:var(--green); }
  .st-parcial { background:var(--orange-bg); border-color:var(--orange-bd); color:var(--orange); }
  .st-pendente{ background:var(--redx-bg); border-color:var(--redx-bd); color:var(--redx); }

  .cliente{ background:var(--g50); border:1px solid var(--g200); border-radius:8px; padding:10px 14px; margin-bottom:14px; page-break-inside:avoid; }
  .cliente .lbl{ font-size:10px; color:var(--g600); font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
  .cliente .nome{ font-size:14px; font-weight:700; color:var(--black); }
  .cliente .sub{ font-size:11px; color:var(--g700); margin-top:2px; font-weight:600; }

  .sect-title{
    font-family:'Oswald',sans-serif; font-size:12px; font-weight:700; color:var(--g600);
    letter-spacing:.1em; text-transform:uppercase; margin:16px 0 8px;
    border-bottom:1px solid var(--g200); padding-bottom:4px;
    page-break-after:avoid;
  }
  .obs-box{
    border:1px solid var(--g500); border-radius:8px; padding:10px 12px; margin-top:8px;
    background:var(--amber-bg); border-left:5px solid var(--amber-bd); page-break-inside:avoid;
  }
  .obs-box.roxa{ background:#ece7f5; border-left-color:#4a2b7a; border-color:#4a2b7a; }
  .obs-box .lbl{
    font-family:'Oswald',sans-serif; font-size:10px; font-weight:800;
    color:var(--amber); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px;
  }
  .obs-box.roxa .lbl{ color:#3b1173; }
  .obs-box .txt{ font-size:12px; color:var(--black); line-height:1.4; white-space:pre-wrap; word-break:break-word; font-weight:600; }

  .produtos{ display:flex; flex-direction:column; gap:8px; }
  /* .row com page-break-inside:avoid pra NÃO quebrar produto no meio da página */
  .row{ display:flex; gap:12px; align-items:stretch; border:1px solid var(--g500); border-radius:8px; padding:8px; page-break-inside:avoid; }
  /* Fotos menores (era 84px, agora 60px) — cabe mais produto por página */
  .foto{ width:60px; height:60px; border:1px solid var(--g200); border-radius:6px; background:var(--g50); display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
  .foto img{ width:100%; height:100%; object-fit:contain; }
  .foto .semfoto{ font-size:9px; color:var(--g500); font-weight:700; }
  .info{ flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
  .info-top{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
  .sku{ font-size:10px; color:var(--g600); font-weight:800; font-family:monospace; }
  .nome{ font-family:'Oswald',sans-serif; font-size:14px; font-weight:800; line-height:1.15; color:var(--black); }
  .grades{ display:flex; flex-wrap:wrap; gap:4px; margin-top:3px; }
  /* Grade — caixinha ✓/✗ pra distinguir sem cor. Sem tachado (prejudica leitura). */
  .grade{
    font-size:11px; font-weight:700; padding:2px 8px; display:inline-flex; align-items:center; gap:5px;
    border-radius:4px; font-family:'Montserrat',sans-serif;
  }
  .grade.sep{ background:var(--green-bg); color:var(--green); border:1.5px solid var(--green-bd); }
  .grade.sep::before{
    content:"✓"; display:inline-flex; align-items:center; justify-content:center;
    width:12px; height:12px; border:2px solid var(--green); border-radius:2px;
    font-family:Arial,sans-serif; font-size:10px; font-weight:900; color:var(--green); line-height:1;
  }
  .grade.pen{ background:#fff; color:var(--black); border:2px dashed var(--redx); }
  .grade.pen::before{
    content:"✗"; display:inline-flex; align-items:center; justify-content:center;
    width:12px; height:12px; border:2px solid var(--redx); border-radius:2px;
    font-family:Arial,sans-serif; font-size:10px; font-weight:900; color:var(--redx); line-height:1;
  }
  .descr-line{
    font-size:11px; color:var(--black); background:var(--amber-bg); border-left:4px solid var(--amber-bd);
    border-radius:4px; padding:5px 8px; margin-top:5px; font-weight:600; line-height:1.35;
    white-space:pre-wrap; word-break:break-word;
  }
  .descr-line::before{ content:"[OBS] "; font-weight:800; color:var(--amber); font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:.05em; }
  .tot{ text-align:center; flex-shrink:0; padding-left:10px; border-left:1px solid var(--g200); display:flex; flex-direction:column; justify-content:center; min-width:78px; }
  .tot .l{ font-size:9px; color:var(--g600); font-weight:800; }
  .tot .v{ font-family:'Oswald',sans-serif; font-size:20px; font-weight:800; color:var(--black); line-height:1; }
  /* Pill: caixinha com símbolo + texto */
  .pill{
    display:inline-flex; align-items:center; gap:5px; padding:2px 7px; border-radius:4px;
    font-size:9.5px; font-weight:800; letter-spacing:.05em; font-family:'Oswald',sans-serif;
    border:1.5px solid;
  }
  .pill::before{
    display:inline-flex; align-items:center; justify-content:center;
    width:12px; height:12px; border:2px solid currentColor; border-radius:2px;
    font-family:Arial,sans-serif; font-size:10px; font-weight:900; line-height:1;
  }
  .pill.sep{ background:var(--green-bg); color:var(--green); border-color:var(--green); }
  .pill.sep::before{ content:"✓"; }
  .pill.par{ background:var(--orange-bg); color:var(--orange); border-color:var(--orange); }
  .pill.par::before{ content:"P"; font-family:'Oswald',monospace; font-size:8px; }
  .pill.pen{ background:#fff; color:var(--redx); border-color:var(--redx); border-style:dashed; }
  .pill.pen::before{ content:"✗"; }

  /* Seção bordados */
  .bordados{ display:flex; flex-direction:column; gap:8px; }
  /* .brow com page-break-inside:avoid */
  .brow{ border:1px solid var(--g500); border-radius:8px; padding:8px; page-break-inside:avoid; display:flex; gap:10px; align-items:flex-start; }
  /* Imagens bordado menores */
  .bimg{ width:56px; height:56px; border:1px solid var(--g200); border-radius:6px; background:var(--g50); display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
  .bimg img{ width:100%; height:100%; object-fit:contain; }
  .bimg .placeholder{ font-size:20px; color:var(--g500); font-weight:700; }
  .binfo{ flex:1; min-width:0; }
  .bnome{ font-family:'Oswald',sans-serif; font-size:12px; font-weight:800; line-height:1.2; word-break:break-word; color:var(--black); }
  .bmeta{ font-size:10.5px; color:var(--g700); font-weight:700; margin-top:2px; }
  .bobs{ margin-top:5px; background:var(--amber-bg); border-left:4px solid var(--amber-bd); border-radius:4px; padding:5px 8px; font-size:11px; line-height:1.35; color:var(--black); font-weight:600; white-space:pre-wrap; word-break:break-word; }
  .bobs .icon{ margin-right:4px; }
  .bobs .who{ font-weight:800; letter-spacing:.02em; color:var(--amber); }

  .foot{ margin-top:14px; padding-top:10px; border-top:2px solid var(--g500); display:flex; justify-content:space-between; font-size:13px; font-weight:800; page-break-inside:avoid; }
  .foot .pecas{ color:var(--red); }
  .msg{ padding:40px; text-align:center; color:var(--g500); font-size:14px; }

  /* Legenda no cabeçalho pra explicar os símbolos em B&W */
  .legenda{ display:flex; gap:14px; font-size:10px; font-weight:700; color:var(--g600); margin-top:8px; margin-bottom:8px; flex-wrap:wrap; align-items:center; }
  .legenda span{ display:inline-flex; align-items:center; gap:5px; }
  .legenda-box{
    display:inline-flex; align-items:center; justify-content:center;
    width:12px; height:12px; border:2px solid; border-radius:2px;
    font-family:Arial,sans-serif; font-size:10px; font-weight:900; line-height:1;
  }
  .legenda-box.par{ font-family:'Oswald',monospace; font-size:8px; }
  .legenda-box.sep{ color:var(--green); border-color:var(--green); }
  .legenda-box.par{ color:var(--orange); border-color:var(--orange); }
  .legenda-box.pen{ color:var(--redx); border-color:var(--redx); }
  /* Ícone gigante do banner de status */
  .status-icon{
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; border:2.5px solid currentColor; border-radius:3px;
    font-family:Arial,sans-serif; font-size:22px; font-weight:900; line-height:1;
    margin-right:12px; flex-shrink:0;
  }

  @media print{
    body{ background:#fff; color:#000; }
    .wrap{ padding:0; gap:0; }
    .folha{ box-shadow:none; border-radius:0; max-width:100%; padding:12mm; page-break-after:always; }
    /* Força cores/backgrounds na impressão (necessário no Chrome/Edge) */
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    /* Impede quebra no meio dos blocos importantes */
    .row, .brow, .obs-box, .status-banner, .cliente, .foot{ page-break-inside:avoid; break-inside:avoid; }
    .sect-title{ page-break-after:avoid; break-after:avoid; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="msg">Carregando…</div></div>
<script>
  // ⚠️ AJUSTE a URL do Worker do SGP (a mesma usada pelo portal).
  var WORKER = "https://citerol-sgp.israel-caetano-lima.workers.dev";

  var qs = new URLSearchParams(location.search);
  var pedido = qs.get("pedido");
  var de = qs.get("de"), ate = qs.get("ate");
  var auto = qs.get("auto");

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function fmtDt(d){ if(!d) return ""; try{ return new Date(d).toLocaleDateString("pt-BR"); }catch(e){ return ""; } }

  // Status do pedido → texto + classe
  var STATUS_LABEL = {
    completa: { lbl:"PEDIDO COMPLETO",        sub:"TODAS AS PEÇAS SEPARADAS",                 cls:"st-completa" },
    parcial:  { lbl:"PEDIDO SEPARADO PARCIAL", sub:"ATENÇÃO: HÁ PEÇAS PENDENTES DE SEPARAÇÃO", cls:"st-parcial"  },
    pendente: { lbl:"SEPARAÇÃO PENDENTE",     sub:"NENHUMA PEÇA FOI SEPARADA AINDA",           cls:"st-pendente" }
  };
  function statusInfo(s){ return STATUS_LABEL[s] || STATUS_LABEL.pendente; }
  function pilProduto(p){
    if(p.statusProduto==="completo") return '<span class="pill sep">SEPARADO</span>';
    if(p.statusProduto==="parcial")  return '<span class="pill par">PARCIAL '+(p.gradesSeparadas||0)+'/'+(p.qtdGrades||0)+'</span>';
    return '<span class="pill pen">PENDENTE</span>';
  }

  // Helpers de bordado
  function ehImg(n){ return /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(n||""); }
  function nomeLimpo(n){ return String(n||"").replace(/\s*~(PROG|AMOSTRA)/gi,"").trim()||n||""; }

  function folhaHTML(emit, o){
    var st = statusInfo(o.statusSeparacao);
    var emitBlock = emit.logoUrl
      ? '<img src="'+esc(emit.logoUrl)+'" alt=""/><div><div class="emit-nome">'+esc(emit.razaoSocial)+'</div>'
        + (emit.cnpj?'<div class="emit-sub">CNPJ: '+esc(emit.cnpj)+'</div>':'')
        + (emit.endereco?'<div class="emit-sub">'+esc(emit.endereco)+'</div>':'')+'</div>'
      : '<div class="brand">'+esc(emit.razaoSocial||"CITEROL")+'</div><div>'
        + (emit.cnpj?'<div class="emit-sub">CNPJ: '+esc(emit.cnpj)+'</div>':'')
        + (emit.endereco?'<div class="emit-sub">'+esc(emit.endereco)+'</div>':'')+'</div>';

    var totalPecas    = (o.produtos||[]).reduce(function(s,p){return s+(p.total||0);},0);
    var totalSeparado = (o.produtos||[]).reduce(function(s,p){return s+(p.totalSeparado||0);},0);

    var rows = (o.produtos||[]).map(function(p){
      var grades = (p.grades||[]).map(function(g){
        var cls = g.separado ? "sep" : "pen";
        // Sem .dot — o CSS agora usa ::before com ☑/☐ que distingue sem cor
        return '<span class="grade '+cls+'">'+esc(g.tamanho||"—")+': <strong>'+(g.qtd||0)+'</strong></span>';
      }).join("");
      var foto = p.foto
        ? '<img src="'+esc(p.foto)+'" alt=""/>'
        : '<span class="semfoto">sem foto</span>';
      var descr = p.descricao ? '<div class="descr-line">'+esc(p.descricao)+'</div>' : '';
      return '<div class="row"><div class="foto">'+foto+'</div>'
        + '<div class="info"><div class="info-top"><span class="sku">'+esc(p.sku)+'</span>'+pilProduto(p)+'</div>'
        + '<div class="nome">'+esc(p.nome)+'</div><div class="grades">'+grades+'</div>'
        + descr
        + '</div>'
        + '<div class="tot"><div class="l">TOTAL</div><div class="v">'+(p.total||0)+'</div>'
        + (p.totalSeparado>0&&p.totalSeparado<p.total ? '<div style="font-size:9px;color:var(--orange);font-weight:700;margin-top:4px">'+p.totalSeparado+' SEP.</div>' : '')
        + '</div></div>';
    }).join("");

    var bordadosSection = "";
    if ((o.bordados||[]).length > 0) {
      var brows = o.bordados.map(function(b){
        var img = (b.fileUrl && ehImg(b.fileName))
          ? '<img src="'+esc(b.fileUrl)+'" alt=""/>'
          : '<span class="placeholder">🧵</span>';
        var meta = [];
        if (b.productName) meta.push(esc(b.productName));
        if (b.positionLabel) meta.push(esc(b.positionLabel));
        var obs = "";
        if (b.obs_programacao) {
          obs += '<div class="bobs"><span class="icon">📋</span><span class="who">PROGRAMAÇÃO:</span> '+esc(b.obs_programacao)+'</div>';
        }
        if (b.obs_bordado) {
          obs += '<div class="bobs"><span class="icon">🧵</span><span class="who">BORDADO:</span> '+esc(b.obs_bordado)+'</div>';
        }
        return '<div class="brow"><div class="bimg">'+img+'</div>'
          + '<div class="binfo"><div class="bnome">'+esc(nomeLimpo(b.fileName))+'</div>'
          + (meta.length ? '<div class="bmeta">'+meta.join(" · ")+'</div>' : '')
          + obs
          + '</div></div>';
      }).join("");
      bordadosSection = '<div class="sect-title">Bordados ('+o.bordados.length+')</div>'
        + '<div class="bordados">'+brows+'</div>';
    }

    var subStatus = st.sub;
    if (o.statusSeparacao === "parcial" && totalPecas > 0) {
      subStatus = totalSeparado + ' DE ' + totalPecas + ' PEÇAS SEPARADAS';
    }

    return '<div class="folha">'
      + '<div class="head">'+emitBlock
      + '<div class="right"><div class="tag">FOLHA DE SEPARAÇÃO</div>'
      + '<div class="pedido">'+(o.pedidoLinx?('PED '+esc(o.pedidoLinx)+' '):'PED ')
      + '<span style="font-size:12px;color:#666;font-weight:600">| '+esc(o.pedido)+'</span></div>'
      + (o.data?'<div class="data">'+fmtDt(o.data)+'</div>':'')+'</div></div>'

      + '<div class="status-banner '+st.cls+'">'
      + '<div style="display:flex;align-items:center;flex:1"><span class="status-icon">'+(o.statusSeparacao==="completa"?"✓":o.statusSeparacao==="parcial"?"P":"✗")+'</span><div><div class="lbl">'+st.lbl+'</div><div class="sub">'+subStatus+'</div></div></div>'
      + '<div class="info-right">'+totalSeparado+' / '+totalPecas+' peças</div>'
      + '</div>'

      + '<div class="legenda"><span><span class="legenda-box sep">✓</span> SEPARADO</span><span><span class="legenda-box pen">✗</span> PENDENTE</span><span><span class="legenda-box par">P</span> PARCIAL</span></div>'

      + '<div class="cliente"><span class="lbl">Cliente: </span><span class="nome">'+esc(o.cliente||"—")+'</span>'
      + ((o.cnpj||o.endereco)?'<div class="sub">'+(o.cnpj?'CNPJ: '+esc(o.cnpj):'')+(o.endereco?(o.cnpj?' · ':'')+esc(o.endereco):'')+'</div>':'')
      + '</div>'

      + '<div class="sect-title">Produtos ('+(o.produtos||[]).length+')</div>'
      + '<div class="produtos">'+rows+'</div>'

      + bordadosSection

      + ((o.infoImportante||o.dadosAdicionais)
          ? '<div class="sect-title">Observações do Pedido</div>'
            + (o.infoImportante
                ? '<div class="obs-box"><div class="lbl">Informação importante do pedido</div><div class="txt">'+esc(o.infoImportante)+'</div></div>'
                : "")
            + (o.dadosAdicionais
                ? '<div class="obs-box roxa"><div class="lbl">Dados adicionais</div><div class="txt">'+esc(o.dadosAdicionais)+'</div></div>'
                : "")
          : "")

      + '<div class="foot"><span>'+(o.produtos||[]).length+' produto(s)'
      + ((o.bordados||[]).length ? ' · '+o.bordados.length+' bordado(s)' : '')
      + '</span>'
      + '<span class="pecas">Total de peças: '+totalPecas+'</span></div>'
      + '</div>';
  }

  function fim(estado){ // sinaliza pro agente
    window.__FOLHA_ESTADO = estado;
    document.title = estado; // "PRONTO" | "VAZIO" | "ERRO"
  }

  function render(j){
    var app = document.getElementById("app");
    var orders = (j && j.data) || [];
    if(!orders.length){ app.innerHTML = '<div class="msg">Nenhum pedido encontrado.</div>'; fim("VAZIO"); return; }
    app.innerHTML = orders.map(function(o){ return folhaHTML(j.emitente||{}, o); }).join("");
    var imgs = Array.prototype.slice.call(app.querySelectorAll("img"));
    var pend = imgs.length;
    if(!pend){ fim("PRONTO"); if(auto) setTimeout(function(){window.print();}, 250); return; }
    imgs.forEach(function(im){
      if(im.complete){ if(--pend===0){ fim("PRONTO"); if(auto) setTimeout(function(){window.print();},250); } }
      else { im.addEventListener("load", done); im.addEventListener("error", done); }
      function done(){ if(--pend<=0){ fim("PRONTO"); if(auto) setTimeout(function(){window.print();},250); } }
    });
    setTimeout(function(){ if(window.__FOLHA_ESTADO!=="PRONTO"){ fim("PRONTO"); if(auto) window.print(); } }, 6000);
  }

  var url = WORKER + "/impressao?" + (pedido ? "pedido="+encodeURIComponent(pedido) : ("de="+esc(de||"")+"&ate="+esc(ate||"")));
  fetch(url).then(function(r){ return r.json(); }).then(render).catch(function(e){
    document.getElementById("app").innerHTML = '<div class="msg">Erro ao carregar: '+esc(e.message)+'</div>'; fim("ERRO");
  });
</script>
</body>
</html>
